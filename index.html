<header>
  <div class="logo-area">
    <h1>WeedPlay</h1>
    <div id="online-counter">Ladataan käyttäjiä...</div>
  </div>
  <p id="status">Tervetuloa katsomaan Weediä!</p>
  <div id="login-section">
    <input type="text" id="username" placeholder="Syötä nimi 'weed'...">
    <button onclick="checkLogin()">Kirjaudu</button>
  </div>
</header>

<div class="main-container">
  <div class="player-box">
    <div id="player"></div>
    <div id="custom-outro" class="hidden">
      <div class="outro-content">
        <h2>"Viimeinen jakso oli tämä, heippa!"</h2>
        <p>Kiitos kun katsoit WeedPlayssa.</p>
        <div class="outro-logo">WEEDPLAY</div>
        <button onclick="restartApp()">Katso uudelleen</button>
      </div>
    </div>
  </div>

  <div class="list-container">
    <h3>Jaksot (1-26)</h3>
    <ul id="episode-list"></ul>
  </div>
</div>
